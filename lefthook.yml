pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,mjs,cjs}'
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: '*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml,css}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm typecheck

pre-push:
  commands:
    test:
      run: pnpm test
